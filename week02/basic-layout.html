<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Mary Monterroso">

</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="HTML layout logo" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://www.utahsafetycouncil.org/content/Default.aspx">Utah Safety
                    Council</a></li>
            <li><a href="https://churchofjesuschrist.org">The Church</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading 1</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Perferendis, sequi.</p>
        </section>
        <section>
            <h2>Heading 2</h2>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Provident odio quam saepe
                voluptatem?</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/fort-collins-colorado/2018/1200x1920/Fort-Collins-Temple06.jpg"
          width="200">
    </aside>
    <footer>
        <p>Mary Monterroso</p>
    </footer>

</body>

</html>
